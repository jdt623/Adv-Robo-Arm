# Robot arm configuration.
#
# Checked into git. Put secrets in config/secrets.yaml (gitignored).

accelerometer:
  i2c_bus: 1
  address: 0x18
  offsets: [0.0, 0.0, 0.0]

rangefinder:
  i2c_bus: 1
  address: 0x29

pressure:
  i2c_bus: 1
  address: 0x77

vision:
  resolution: [640, 480]
  fps: 30

stepper_joints:
