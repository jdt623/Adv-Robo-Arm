name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          # Skip hardware deps (gpiozero/lgpio) in CI — they need a Pi.
          pip install numpy pyyaml pytest pytest-cov ruff
          pip install -e . --no-deps

      - name: Lint
        run: |
          ruff format --check .
          ruff check .

      - name: Test (non-hardware)
        run: pytest -m "not hardware"
